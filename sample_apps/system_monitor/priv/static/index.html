<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEAM System Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: #16213e;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #0f3460;
    }
    header h1 {
      font-size: 24px;
      color: #e94560;
      font-weight: 700;
    }
    header .status {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 14px;
      color: #8892b0;
    }
    header .status .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e94560;
      animation: pulse 2s infinite;
    }
    header .status .dot.connected { background: #4ecca3; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .container { padding: 20px 30px; max-width: 1400px; margin: 0 auto; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }
    .card {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      border: 1px solid #0f3460;
    }
    .card .label {
      font-size: 12px;
      text-transform: uppercase;
      color: #8892b0;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 28px;
      font-weight: 700;
      color: #e94560;
    }
    .card .sub {
      font-size: 12px;
      color: #5a6a8a;
      margin-top: 4px;
    }

    .section {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #0f3460;
    }
    .section h2 {
      font-size: 16px;
      color: #4ecca3;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .mem-bars { display: flex; flex-direction: column; gap: 10px; }
    .mem-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mem-bar-row .label {
      width: 100px;
      font-size: 13px;
      color: #8892b0;
      text-align: right;
    }
    .mem-bar-row .bar-bg {
      flex: 1;
      height: 24px;
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .mem-bar-row .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
      min-width: 2px;
    }
    .mem-bar-row .bar-value {
      width: 90px;
      font-size: 13px;
      color: #e0e0e0;
      font-family: monospace;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 2px solid #0f3460;
      color: #4ecca3;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    tbody td {
      padding: 6px 12px;
      border-bottom: 1px solid #0f346033;
      font-family: monospace;
      font-size: 12px;
    }
    tbody tr:hover { background: #1a1a2e; }
    .name-col { color: #e94560; }
    .num-col { text-align: right; color: #4ecca3; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>BEAM System Monitor</h1>
    <div class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Connecting...</span>
      <span>|</span>
      <span>Uptime: <strong id="uptime">--</strong></span>
    </div>
  </header>

  <div class="container">
    <div class="cards">
      <div class="card">
        <div class="label">Total Memory</div>
        <div class="value" id="mem-total">--</div>
        <div class="sub" id="mem-total-bytes"></div>
      </div>
      <div class="card">
        <div class="label">Process Count</div>
        <div class="value" id="proc-count">--</div>
        <div class="sub" id="proc-limit"></div>
      </div>
      <div class="card">
        <div class="label">Schedulers</div>
        <div class="value" id="schedulers">--</div>
        <div class="sub" id="schedulers-total"></div>
      </div>
      <div class="card">
        <div class="label">Run Queue</div>
        <div class="value" id="run-queue">--</div>
        <div class="sub">pending work</div>
      </div>
      <div class="card">
        <div class="label">Ports</div>
        <div class="value" id="ports">--</div>
        <div class="sub">open ports</div>
      </div>
      <div class="card">
        <div class="label">ETS Tables</div>
        <div class="value" id="ets-count">--</div>
        <div class="sub">active tables</div>
      </div>
    </div>

    <div class="section">
      <h2>Memory Breakdown</h2>
      <div class="mem-bars" id="mem-bars"></div>
    </div>

    <div class="grid-2">
      <div class="section">
        <h2>Top Processes by Memory</h2>
        <table>
          <thead>
            <tr>
              <th>PID</th>
              <th>Name</th>
              <th style="text-align:right">Memory</th>
              <th style="text-align:right">MsgQ</th>
            </tr>
          </thead>
          <tbody id="proc-table"></tbody>
        </table>
      </div>

      <div class="section">
        <h2>ETS Tables</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th style="text-align:right">Size</th>
              <th style="text-align:right">Memory</th>
            </tr>
          </thead>
          <tbody id="ets-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      var units = ['B', 'KB', 'MB', 'GB'];
      var i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(i > 1 ? 1 : 0) + ' ' + units[i];
    }

    function formatUptime(seconds) {
      var d = Math.floor(seconds / 86400);
      var h = Math.floor((seconds % 86400) / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      var s = seconds % 60;
      var parts = [];
      if (d > 0) parts.push(d + 'd');
      if (h > 0) parts.push(h + 'h');
      if (m > 0) parts.push(m + 'm');
      parts.push(s + 's');
      return parts.join(' ');
    }

    var memColors = {
      processes: '#e94560',
      ets: '#4ecca3',
      atom: '#f9a825',
      binary: '#7c4dff',
      code: '#00bcd4'
    };

    function clearChildren(el) {
      while (el.firstChild) { el.removeChild(el.firstChild); }
    }

    function createEl(tag, attrs, textContent) {
      var el = document.createElement(tag);
      if (attrs) {
        Object.keys(attrs).forEach(function(k) {
          if (k === 'style' && typeof attrs[k] === 'object') {
            Object.keys(attrs[k]).forEach(function(sk) { el.style[sk] = attrs[k][sk]; });
          } else if (k === 'className') {
            el.className = attrs[k];
          } else {
            el.setAttribute(k, attrs[k]);
          }
        });
      }
      if (textContent !== undefined) el.textContent = textContent;
      return el;
    }

    function updateDashboard(data) {
      var mem = data.memory;
      document.getElementById('mem-total').textContent = formatBytes(mem.total);
      document.getElementById('mem-total-bytes').textContent = mem.total.toLocaleString() + ' bytes';

      document.getElementById('proc-count').textContent = data.processes.count.toLocaleString();
      document.getElementById('proc-limit').textContent = 'limit: ' + data.processes.limit.toLocaleString();

      document.getElementById('schedulers').textContent = data.schedulers.online;
      document.getElementById('schedulers-total').textContent = 'total: ' + data.schedulers.total;

      document.getElementById('run-queue').textContent = data.run_queue;
      document.getElementById('ports').textContent = data.ports;
      document.getElementById('ets-count').textContent = data.ets_tables;
      document.getElementById('uptime').textContent = formatUptime(data.uptime_seconds);

      // Memory bars
      var barsEl = document.getElementById('mem-bars');
      clearChildren(barsEl);
      var total = mem.total;
      var memTypes = ['processes', 'ets', 'atom', 'binary', 'code'];
      memTypes.forEach(function(key) {
        var pct = Math.max(0.5, (mem[key] / total) * 100);
        var color = memColors[key] || '#888';

        var row = createEl('div', {className: 'mem-bar-row'});
        row.appendChild(createEl('div', {className: 'label'}, key));

        var barBg = createEl('div', {className: 'bar-bg'});
        var barFill = createEl('div', {className: 'bar-fill'});
        barFill.style.width = pct.toFixed(1) + '%';
        barFill.style.background = color;
        barBg.appendChild(barFill);
        row.appendChild(barBg);

        row.appendChild(createEl('div', {className: 'bar-value'}, formatBytes(mem[key])));
        barsEl.appendChild(row);
      });
    }

    function updateProcessTable(procs) {
      var tbody = document.getElementById('proc-table');
      clearChildren(tbody);
      procs.slice(0, 20).forEach(function(p) {
        var tr = document.createElement('tr');
        var tdPid = document.createElement('td');
        tdPid.textContent = p.pid;
        tr.appendChild(tdPid);

        var tdName = createEl('td', {className: 'name-col'}, p.name || '-');
        tr.appendChild(tdName);

        var tdMem = createEl('td', {className: 'num-col'}, formatBytes(p.memory));
        tr.appendChild(tdMem);

        var tdMsgQ = createEl('td', {className: 'num-col'}, String(p.message_queue));
        tr.appendChild(tdMsgQ);

        tbody.appendChild(tr);
      });
    }

    function updateETSTable(tables) {
      var tbody = document.getElementById('ets-table');
      clearChildren(tbody);
      tables.slice(0, 20).forEach(function(t) {
        var tr = document.createElement('tr');

        var tdName = createEl('td', {className: 'name-col'}, t.name);
        tr.appendChild(tdName);

        var tdSize = createEl('td', {className: 'num-col'}, t.size.toLocaleString());
        tr.appendChild(tdSize);

        var tdMem = createEl('td', {className: 'num-col'}, formatBytes(t.memory));
        tr.appendChild(tdMem);

        tbody.appendChild(tr);
      });
    }

    // SSE connection
    function connect() {
      var dot = document.getElementById('status-dot');
      var text = document.getElementById('status-text');

      var es = new EventSource('/events');

      es.onopen = function() {
        dot.classList.add('connected');
        text.textContent = 'Live';
      };

      es.addEventListener('metrics', function(e) {
        var data = JSON.parse(e.data);
        updateDashboard(data);
      });

      es.onerror = function() {
        dot.classList.remove('connected');
        text.textContent = 'Reconnecting...';
      };
    }

    // Load initial data for process and ETS tables
    function loadTables() {
      fetch('/api/processes')
        .then(function(r) { return r.json(); })
        .then(function(data) { updateProcessTable(data.processes); });

      fetch('/api/ets')
        .then(function(r) { return r.json(); })
        .then(function(data) { updateETSTable(data.tables); });
    }

    // Refresh tables periodically
    setInterval(loadTables, 5000);

    // Start
    connect();
    loadTables();

    // Load initial snapshot
    fetch('/api/snapshot')
      .then(function(r) { return r.json(); })
      .then(function(data) { updateDashboard(data); });
  </script>
</body>
</html>
