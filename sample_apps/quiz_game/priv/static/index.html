<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hibana Quiz Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 600px;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid #0f3460;
    }
    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #e94560;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #e94560;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; margin-top: 8px; }

    /* Waiting Room */
    .players-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }
    .player-tag {
      background: #0f3460;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .player-tag.host { background: #e94560; }
    .game-code {
      text-align: center;
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 12px;
      color: #e94560;
      margin: 16px 0;
    }
    .game-code-label {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
    }

    /* Question Screen */
    .timer-bar {
      width: 100%;
      height: 8px;
      background: #0f3460;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      transition: width 0.1s linear;
      border-radius: 4px;
    }
    .timer-text {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 8px;
    }
    .question-counter {
      text-align: center;
      color: #888;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .question-text {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 24px;
      line-height: 1.4;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .option-btn {
      padding: 20px 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      text-align: center;
      word-wrap: break-word;
    }
    .option-btn:hover { transform: scale(1.03); }
    .option-btn:active { transform: scale(0.97); }
    .option-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .option-btn.selected { outline: 3px solid #fff; outline-offset: 2px; }
    .option-btn.correct { outline: 3px solid #00ff88; outline-offset: 2px; }
    .option-btn.wrong { opacity: 0.4; }
    .opt-0 { background: #e94560; }
    .opt-1 { background: #0f3460; }
    .opt-2 { background: #2d6a4f; }
    .opt-3 { background: #e07c24; }

    .score-display {
      text-align: center;
      margin-top: 16px;
      font-size: 1.1rem;
      color: #888;
    }
    .score-display span { color: #e94560; font-weight: 700; font-size: 1.3rem; }
    .points-popup {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      color: #00ff88;
      margin: 16px 0;
      animation: popIn 0.3s ease-out;
    }
    .points-popup.zero { color: #e94560; }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Results / Leaderboard */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 8px;
      margin: 24px 0;
      height: 200px;
    }
    .podium-place {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100px;
    }
    .podium-name {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    .podium-score {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 4px;
    }
    .podium-bar {
      width: 80px;
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: rgba(255,255,255,0.3);
    }
    .podium-bar.first { background: #ffd700; height: 140px; }
    .podium-bar.second { background: #c0c0c0; height: 100px; }
    .podium-bar.third { background: #cd7f32; height: 70px; }
    .leaderboard-list {
      list-style: none;
      padding: 0;
    }
    .leaderboard-list li {
      display: flex;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #0f3460;
      font-size: 1rem;
    }
    .leaderboard-list li:last-child { border-bottom: none; }
    .rank { color: #888; margin-right: 12px; }

    .status-msg {
      text-align: center;
      color: #888;
      padding: 16px;
      font-style: italic;
    }
    .error-msg {
      color: #e94560;
      text-align: center;
      padding: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hibana Quiz</h1>
    <p class="subtitle">Multiplayer trivia powered by Elixir</p>

    <!-- LOBBY SCREEN -->
    <div id="lobby" class="screen active">
      <div class="card">
        <h2>Host a Game</h2>
        <input id="hostName" type="text" placeholder="Your name" maxlength="20">
        <select id="quizSelect"><option value="">Loading quizzes...</option></select>
        <button class="btn btn-primary" onclick="createGame()">Create Game</button>
      </div>
      <div class="card">
        <h2>Join a Game</h2>
        <input id="joinCode" type="text" placeholder="4-digit game code" maxlength="4">
        <input id="joinName" type="text" placeholder="Your name" maxlength="20">
        <button class="btn btn-primary" onclick="joinGame()">Join Game</button>
      </div>
      <div id="lobbyError" class="error-msg"></div>
    </div>

    <!-- WAITING ROOM -->
    <div id="waiting" class="screen">
      <div class="card">
        <div class="game-code-label">GAME CODE</div>
        <div class="game-code" id="displayCode">----</div>
        <div class="game-code-label" id="quizTitle"></div>
      </div>
      <div class="card">
        <h2>Players</h2>
        <div class="players-list" id="playersList"></div>
        <p class="status-msg" id="waitingStatus">Waiting for players...</p>
        <button class="btn btn-primary" id="startBtn" style="display:none;" onclick="startGame()">Start Game</button>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game" class="screen">
      <div class="question-counter" id="qCounter">Question 1 / 5</div>
      <div class="timer-text" id="timerText">15</div>
      <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
      <div class="question-text" id="qText">Loading question...</div>
      <div class="options-grid" id="optionsGrid"></div>
      <div id="pointsPopup"></div>
      <div class="score-display">Score: <span id="myScore">0</span></div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results" class="screen">
      <div class="card">
        <h2 style="text-align:center;">Game Over!</h2>
        <div class="podium" id="podium"></div>
      </div>
      <div class="card">
        <h2>Leaderboard</h2>
        <ul class="leaderboard-list" id="leaderboardList"></ul>
      </div>
      <button class="btn btn-secondary" onclick="backToLobby()">Play Again</button>
    </div>
  </div>

  <script>
    let ws = null;
    let state = {
      screen: 'lobby',
      code: null,
      name: null,
      isHost: false,
      score: 0,
      currentQuestion: null,
      answered: false,
      timerInterval: null,
      timeLeft: 0,
      timeLimit: 15
    };

    const API = window.location.origin;
    const WS_BASE = (location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host;

    // --- Utility: safe text escaping ---
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // --- Screen management ---
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById(name).classList.add('active');
      state.screen = name;
    }

    // --- Load quizzes ---
    async function loadQuizzes() {
      try {
        const res = await fetch(API + '/api/quizzes');
        const data = await res.json();
        const sel = document.getElementById('quizSelect');
        sel.textContent = '';
        data.quizzes.forEach(function(q) {
          const opt = document.createElement('option');
          opt.value = q.id;
          opt.textContent = q.title + ' (' + q.question_count + ' questions)';
          sel.appendChild(opt);
        });
      } catch (e) {
        console.error('Failed to load quizzes:', e);
      }
    }

    // --- Create game ---
    async function createGame() {
      const host = document.getElementById('hostName').value.trim();
      const quizId = document.getElementById('quizSelect').value;
      const errEl = document.getElementById('lobbyError');
      errEl.textContent = '';

      if (!host) { errEl.textContent = 'Please enter your name'; return; }
      if (!quizId) { errEl.textContent = 'Please select a quiz'; return; }

      try {
        const res = await fetch(API + '/api/games', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quiz_id: quizId, host: host })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Failed to create game'; return; }

        state.code = data.code;
        state.name = host;
        state.isHost = true;
        state.score = 0;
        connectWebSocket();
      } catch (e) {
        errEl.textContent = 'Connection error';
      }
    }

    // --- Join game ---
    async function joinGame() {
      const code = document.getElementById('joinCode').value.trim();
      const name = document.getElementById('joinName').value.trim();
      const errEl = document.getElementById('lobbyError');
      errEl.textContent = '';

      if (!code || code.length !== 4) { errEl.textContent = 'Enter a 4-digit game code'; return; }
      if (!name) { errEl.textContent = 'Please enter your name'; return; }

      try {
        const res = await fetch(API + '/api/games/' + code + '/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Failed to join'; return; }

        state.code = code;
        state.name = name;
        state.isHost = false;
        state.score = 0;
        connectWebSocket();
      } catch (e) {
        errEl.textContent = 'Connection error';
      }
    }

    // --- WebSocket ---
    function connectWebSocket() {
      if (ws) ws.close();
      ws = new WebSocket(WS_BASE + '/ws/game/' + state.code + '?name=' + encodeURIComponent(state.name));

      ws.onopen = function() {
        document.getElementById('displayCode').textContent = state.code;
        document.getElementById('startBtn').style.display = state.isHost ? 'block' : 'none';
        showScreen('waiting');
      };

      ws.onmessage = function(event) {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };

      ws.onclose = function() {
        if (state.screen === 'game' || state.screen === 'waiting') {
          clearTimer();
        }
      };

      ws.onerror = function() {
        document.getElementById('lobbyError').textContent = 'WebSocket connection failed';
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'connected':
          updatePlayers(msg.players);
          break;
        case 'player_joined':
          updatePlayers(msg.players);
          break;
        case 'question':
          showQuestion(msg);
          break;
        case 'answer_accepted':
          state.score += msg.points;
          document.getElementById('myScore').textContent = state.score;
          showPointsPopup(msg.points);
          break;
        case 'answer_result':
          showAnswerResult(msg);
          break;
        case 'game_over':
          showResults(msg.leaderboard);
          break;
        case 'error':
          console.error('Server error:', msg.message);
          break;
      }
    }

    function updatePlayers(players) {
      const el = document.getElementById('playersList');
      el.textContent = '';
      players.forEach(function(p) {
        const tag = document.createElement('span');
        tag.className = 'player-tag' + (p === state.name && state.isHost ? ' host' : '');
        tag.textContent = p;
        el.appendChild(tag);
      });
      document.getElementById('waitingStatus').textContent =
        players.length + ' player' + (players.length !== 1 ? 's' : '') + ' in lobby';
    }

    // --- Start game ---
    function startGame() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'start' }));
      }
    }

    // --- Question ---
    function showQuestion(msg) {
      showScreen('game');
      state.currentQuestion = msg;
      state.answered = false;
      state.timeLeft = msg.time_limit;
      state.timeLimit = msg.time_limit;

      document.getElementById('qCounter').textContent = 'Question ' + (msg.index + 1) + ' / ' + msg.total;
      document.getElementById('qText').textContent = msg.text;
      document.getElementById('pointsPopup').textContent = '';

      const grid = document.getElementById('optionsGrid');
      grid.textContent = '';
      msg.options.forEach(function(opt, i) {
        const btn = document.createElement('button');
        btn.className = 'option-btn opt-' + i;
        btn.textContent = opt;
        btn.onclick = function() { submitAnswer(i, btn); };
        grid.appendChild(btn);
      });

      startTimer();
    }

    function submitAnswer(option, btn) {
      if (state.answered) return;
      state.answered = true;

      document.querySelectorAll('.option-btn').forEach(function(b) { b.disabled = true; });
      btn.classList.add('selected');

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'answer', option: option }));
      }
    }

    function showPointsPopup(points) {
      const el = document.getElementById('pointsPopup');
      el.textContent = '';
      const popup = document.createElement('div');
      popup.className = points > 0 ? 'points-popup' : 'points-popup zero';
      popup.textContent = '+' + points;
      el.appendChild(popup);
    }

    function showAnswerResult(msg) {
      clearTimer();
      const correct = msg.correct;
      const btns = document.querySelectorAll('.option-btn');
      btns.forEach(function(btn, i) {
        btn.disabled = true;
        if (i === correct) {
          btn.classList.add('correct');
        } else if (!btn.classList.contains('selected')) {
          btn.classList.add('wrong');
        }
      });

      // Update score from server
      if (msg.scores && msg.scores[state.name] !== undefined) {
        state.score = msg.scores[state.name];
        document.getElementById('myScore').textContent = state.score;
      }
    }

    // --- Timer ---
    function startTimer() {
      clearTimer();
      const startTime = Date.now();
      const duration = state.timeLimit * 1000;

      state.timerInterval = setInterval(function() {
        const elapsed = Date.now() - startTime;
        const remaining = Math.max(0, duration - elapsed);
        const seconds = Math.ceil(remaining / 1000);

        document.getElementById('timerText').textContent = seconds;
        document.getElementById('timerFill').style.width = ((remaining / duration) * 100) + '%';

        if (remaining <= 0) {
          clearTimer();
          if (!state.answered) {
            state.answered = true;
            document.querySelectorAll('.option-btn').forEach(function(b) { b.disabled = true; });
          }
        }
      }, 100);
    }

    function clearTimer() {
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }
    }

    // --- Results ---
    function showResults(leaderboard) {
      clearTimer();
      showScreen('results');

      // Podium (top 3) - layout order: 2nd, 1st, 3rd
      const podium = document.getElementById('podium');
      podium.textContent = '';
      var podiumOrder = [1, 0, 2]; // indices: 2nd place, 1st place, 3rd place
      var barClasses = ['second', 'first', 'third'];
      var rankLabels = ['2', '1', '3'];

      podiumOrder.forEach(function(rank, layoutIdx) {
        if (rank < leaderboard.length) {
          var p = leaderboard[rank];
          var place = document.createElement('div');
          place.className = 'podium-place';

          var nameEl = document.createElement('div');
          nameEl.className = 'podium-name';
          nameEl.textContent = p.name;
          place.appendChild(nameEl);

          var scoreEl = document.createElement('div');
          scoreEl.className = 'podium-score';
          scoreEl.textContent = p.score + ' pts';
          place.appendChild(scoreEl);

          var bar = document.createElement('div');
          bar.className = 'podium-bar ' + barClasses[layoutIdx];
          bar.textContent = rankLabels[layoutIdx];
          place.appendChild(bar);

          podium.appendChild(place);
        }
      });

      // Full leaderboard
      var list = document.getElementById('leaderboardList');
      list.textContent = '';
      leaderboard.forEach(function(p, i) {
        var li = document.createElement('li');

        var leftSpan = document.createElement('span');
        var rankSpan = document.createElement('span');
        rankSpan.className = 'rank';
        rankSpan.textContent = '#' + (i + 1);
        leftSpan.appendChild(rankSpan);
        leftSpan.appendChild(document.createTextNode(p.name));
        li.appendChild(leftSpan);

        var rightSpan = document.createElement('span');
        rightSpan.textContent = p.score + ' pts';
        li.appendChild(rightSpan);

        list.appendChild(li);
      });
    }

    function backToLobby() {
      if (ws) ws.close();
      ws = null;
      state = { screen: 'lobby', code: null, name: null, isHost: false, score: 0,
                 currentQuestion: null, answered: false, timerInterval: null, timeLeft: 0, timeLimit: 15 };
      document.getElementById('lobbyError').textContent = '';
      showScreen('lobby');
      loadQuizzes();
    }

    // Init
    loadQuizzes();
  </script>
</body>
</html>
